        window.onload = () => {
            const sel = document.getElementById('xianming');
            Object.keys(data).forEach(k => {
                let opt = document.createElement('option');
                opt.value = k; opt.textContent = k;
                sel.appendChild(opt);
            });
        };

        function filterOptions() {
            const term = document.getElementById('search').value.toUpperCase();
            const sel = document.getElementById('xianming');
            Array.from(sel.options).forEach(opt => {
                opt.style.display = opt.value.includes(term) ? '' : 'none';
            });
        }

        function query() {
            const key = document.getElementById('xianming').value;
            if (!key) return;
            const d = data[key];
            const res = document.getElementById('result');
            res.innerHTML = `
                <h2 style="margin:0 0 15px 0;color:#27ae60;">✅ ${key} 仙命 查詢結果</h2>

            `;
            res.style.display = 'block';
        }

        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => alert('✅ 已複製到剪貼簿！'));
